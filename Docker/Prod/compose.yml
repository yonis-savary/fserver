services:
  application: &application
    build:
      context: ../..
      dockerfile: Docker/Prod/dockerfile.application
      args:
        UID: ${UID}
        GID: ${GID}
    user: "${UID}:${GID}"
    volumes:
      - ../app_storage:/app/Storage
      - app_sessions:/var/lib/php/sessions
    env_file:
      - ../../.env
    networks:
      - public
      - private
  server:
    image: nginx:alpine
    env_file:
      - ../../.env
    ports:
      - "${APPLICATION_PORT:-8080}:80"
    volumes:
      - ./apcu-nginx-vhost.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - application
    networks:
      - public

volumes:
  app_sessions:

networks:
  public:
  private:
    internal: true